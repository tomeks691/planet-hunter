name: CI

on:
  pull_request:
  push:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static sanity check (compile)
        run: |
          python -m compileall -q planet_hunter retry_errors.py import_known_planets.py build_training_db.py

      - name: App import smoke test
        run: |
          python - <<'PY'
          from planet_hunter.main import app
          print(f"Loaded app: {app.title}")
          PY

      - name: ML classifier logic check
        run: |
          python scripts/ci_check_ml_classifier.py

      - name: build_training_db blacklist check
        run: |
          python scripts/ci_check_build_training_blacklist.py

      - name: ML DB migration/filter/snapshot check
        run: |
          python scripts/ci_check_ml_db_features.py
